<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Ready | Unknown Modz</title>
    <style>
        :root { --bg: #000000; --card: #121212; --accent: #00ff88; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        #main, #bypass { display: none; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 28px; padding: 40px 30px; }
        .key-box { background: #000; padding: 20px; border-radius: 18px; border: 1px dashed var(--accent); margin: 20px 0; font-family: monospace; font-size: 18px; color: var(--accent); font-weight: bold; }
        .btn { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="main">
        <h1>Access Unlocked</h1>
        <div class="card">
            <h2>Success!</h2>
            <div class="key-box" id="keyText">GENERATING...</div>
            <button class="btn" onclick="copy()">COPY KEY</button>
        </div>
    </div>
    <div id="bypass">
        <h2 style="color:red;">Bypass Detected!</h2>
        <p>Please use the official link.</p>
        <button class="btn" onclick="location.href='index.html'">BACK</button>
    </div>
</div>
<script>
    window.onload = async function() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('source') === "official" || document.referrer.includes("earnlinks")) {
            document.getElementById('main').style.display = "block";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const day = Math.floor(Date.now() / 86400000);
                const seed = parseInt(data.ip.replace(/\./g, '').substring(0, 5)) + day + 2026;
                let key = "UKM-";
                let s = seed;
                const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
                for(let i=0; i<12; i++) {
                    s = (s * 9301 + 49297) % 233280;
                    key += chars[Math.floor((s/233280) * chars.length)];
                    if((i+1)%4==0 && i<11) key += "-";
                }
                document.getElementById('keyText').innerText = key;
            } catch { document.getElementById('keyText').innerText = "CONNECTION ERROR"; }
        } else { document.getElementById('bypass').style.display = "block"; }
    };
    function copy() {
        navigator.clipboard.writeText(document.getElementById('keyText').innerText);
        alert("Key Copied!");
    }
</script>
</body>
</html>
